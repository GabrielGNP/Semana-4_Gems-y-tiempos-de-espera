<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Demo Espera Implícita</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    #status { margin-top: 12px; color: #444; }
    .box { padding: 12px; border: 1px solid #ddd; border-radius: 8px; max-width: 520px; }
    input { padding: 8px; width: 260px; }
    button { padding: 8px 12px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>Validación de Espera Implícita (Selenium + Java)</h1>

  <div class="box">
    <p>El formulario aparecerá ~3 segundos después (simula carga lenta).</p>
    <div id="app"></div>
    <div id="status">Estado: esperando que JS renderice el formulario…</div>
  </div>

  <script>
    setTimeout(() => {
      const app = document.getElementById('app');

      const input = document.createElement('input');
      input.id = 'username';
      input.placeholder = 'Escribe tu nombre';

      const btn = document.createElement('button');
      btn.id = 'submit';
      btn.textContent = 'Enviar';
      btn.addEventListener('click', () => {
        const status = document.getElementById('status');
        status.textContent = 'Estado: enviado -> ' + input.value;
      });

      app.appendChild(input);
      app.appendChild(btn);

      document.getElementById('status').textContent = 'Estado: formulario listo';
    }, 3000);
  </script>
</body>
</html>
